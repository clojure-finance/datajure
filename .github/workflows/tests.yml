name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest
      - name: Run core tests
        run: bash bin/run-tests.sh
